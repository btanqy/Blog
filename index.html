<!doctype html>
<html>
  <head>
    <!-- External JS, defer is fine here -->
    <link rel="stylesheet" href="style.css" />
    <script defer src="home.js"></script>

    <meta property="og:title" content="btanqy" />
    <meta
      property="og:image"
      content="Main/Projects/2026/Images/Demo Fusor/thumbnail.jpg"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://btanqy.com" />
    <meta property="og:description" content="Brian makes things" />
  </head>
  <body>
    <!-- Container where banner.html will be loaded -->
    <div id="banner-container"></div>
    <div id="boxHome"></div>

    <!-- Page content below -->

    <!-- Banner-loading script (runs after DOM is available) -->
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        fetch("/Main/banner.html")
          .then((res) => res.text())
          .then((data) => {
            document.getElementById("banner-container").innerHTML = data;
          })
          .catch((err) => console.error("Error loading banner:", err));
      });
    </script>
  </body>
</html>
